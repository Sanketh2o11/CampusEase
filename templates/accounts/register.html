{% extends 'base.html' %}

{% block title %}Register - CampusEase{% endblock %}

{% block content %}
<div class="container" style="max-width: 500px; margin-top: 3rem;">
    <div class="card">
        <div class="card-header">
            <h2 class="card-title text-center">Join CampusEase</h2>
            <p class="text-center text-muted text-sm" style="margin-top: 0.5rem;">Create your student dashboard account.</p>
        </div>
        
        <form method="post">
            {% csrf_token %}
            
            {% include 'partials/_form_fields.html' %}
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Create Account</button>
        </form>
        
        <div class="text-center mt-4">
            <p class="text-muted text-sm">Already have an account? <a href="{% url 'login' %}">Login here</a></p>
        </div>
    </div>
</div>

{% endblock %}
