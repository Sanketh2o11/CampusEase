{% extends 'base.html' %}

{% block title %}Upload Material - CampusEase{% endblock %}

{% block content %}
<div class="container" style="max-width: 600px; margin-top: 2rem;">
    <div class="card">
        <div class="card-header flex justify-between items-center">
            <h2 class="card-title">Upload Study Material</h2>
            <a href="{% url 'material_list' %}" class="text-muted text-sm">Cancel</a>
        </div>
        
        <form method="post">
            {% csrf_token %}
            
            {% include 'partials/_form_fields.html' %}
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Upload Link</button>
        </form>
    </div>
</div>

<script>
    document.querySelectorAll('input[type="text"], input[type="url"]').forEach(input => {
        input.required = true;
    });
</script>
{% endblock %}
