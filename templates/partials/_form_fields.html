{% if form.non_field_errors %}
<div class="alert alert-error">
    {% for error in form.non_field_errors %}{{ error }}{% endfor %}
</div>
{% endif %}

{% for field in form %}
    <div class="form-group">
        <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
        {{ field }}
        {% if field.help_text %}
            <small class="text-muted" style="display: block; margin-top: 0.25rem;">{{ field.help_text|safe }}</small>
        {% endif %}
        {% if field.errors %}
            <div class="text-error mt-2 text-sm" style="color: var(--danger);">{{ field.errors.0 }}</div>
        {% endif %}
    </div>
{% endfor %}
